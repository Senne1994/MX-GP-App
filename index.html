<select id="yearSelect" onchange="changeYear(this.value)">
    </select>

<div id="content">
    <h1 id="yearTitle">Laden...</h1>
    <div id="calendarSection"></div>
    <div id="mxgpSection"></div>
</div>

<script>
// 1. Haal eerst de beschikbare jaren op
fetch('years_index.json')
    .then(res => res.json())
    .then(index => {
        const select = document.getElementById('yearSelect');
        index.available_years.forEach(year => {
            let opt = document.createElement('option');
            opt.value = year;
            opt.innerHTML = year;
            select.appendChild(opt);
        });
        // Laad standaard het eerste (nieuwste) jaar
        changeYear(index.available_years[0]);
    });

// 2. Functie om de data van het gekozen jaar te laden
function changeYear(year) {
    fetch(`data_${year}.json`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('yearTitle').innerText = `Seizoen ${year}`;
            renderData(data);
        });
}

function renderData(data) {
    // Hier kun je je tabellen vullen zoals je eerder deed
    // Bijvoorbeeld: console.log(data.calendar);
    console.log("Data voor dit jaar:", data);
}
</script>
